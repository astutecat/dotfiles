gui:
  skipRewordInEditorWarning: false
  nerdFontsVersion: "3"
  spinner:
    frames: ['⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏']
    rate: 100
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
  autoForwardBranches: allBranches
os:
  copyToClipboardCmd: >
    printf "\033]52;c;$(printf {{text}} | base64 -w 0)\a" > /dev/tty
